<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" name="viewport" />
    <title>Login - DECY</title>
    <meta name="description" content="Sign in to your DECY account." />
    <script src="https://cdn.tailwindcss.com?plugins=forms"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-25..0&display=swap" rel="stylesheet" />
    
    <script>
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "ios-bg": "#0A0A0A",
                        "brand-violet": "#8B5CF6",
                    },
                    fontFamily: {
                        sans: ["Inter", "sans-serif"]
                    }
                }
            }
        };
    </script>
    <style type="text/tailwindcss">
        @layer base {
            body {
                @apply bg-ios-bg text-white font-sans antialiased;
                -webkit-tap-highlight-color: transparent;
            }
        }
    </style>
    <style>
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
            opacity: 0.015;
            pointer-events: none;
            z-index: 1000;
        }

        .ambient-orb {
            filter: blur(100px);
            opacity: 0.4;
            position: fixed;
            border-radius: 9999px;
            z-index: -1;
            pointer-events: none;
        }

        .glass-card {
            backdrop-filter: blur(24px) saturate(180%);
            -webkit-backdrop-filter: blur(24px) saturate(180%);
            background: rgba(15, 23, 42, 0.35);
            border: 1px solid rgba(255, 255, 255, 0.15); /* Refractive bevel */
            border-top: 1px solid rgba(255, 255, 255, 0.4); /* Sharp crystal edge */
            box-shadow: 0 16px 40px rgba(0, 0, 0, 0.4), inset 0 1px 1px rgba(255, 255, 255, 0.12);
            border-radius: 24px;
        }

        .glass-input {
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: white;
            transition: all 0.3s ease;
        }

        .glass-input:focus {
            border-color: rgba(139, 92, 246, 0.5);
            background: rgba(0, 0, 0, 0.4);
            box-shadow: 0 0 0 1px rgba(139, 92, 246, 0.5), inset 0 1px 2px rgba(0,0,0,0.5);
            outline: none;
        }

        .glass-button {
            background: linear-gradient(135deg, rgba(139, 92, 246, 0.8) 0%, rgba(109, 40, 217, 0.9) 100%);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-top: 1px solid rgba(255, 255, 255, 0.4);
            box-shadow: 0 4px 15px rgba(139, 92, 246, 0.3), inset 0 1px 1px rgba(255, 255, 255, 0.3);
            transition: all 0.2s ease;
        }

        .glass-button:hover {
            transform: translateY(-1px);
            box-shadow: 0 6px 20px rgba(139, 92, 246, 0.4), inset 0 1px 1px rgba(255, 255, 255, 0.4);
        }

        .glass-button:active {
            transform: translateY(1px);
        }

        .google-button {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.2s ease;
        }

        .google-button:hover {
            background: rgba(255, 255, 255, 0.1);
            border-color: rgba(255, 255, 255, 0.2);
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4 relative overflow-hidden">
    
    <!-- Ambient Background -->
    <div class="ambient-orb bg-brand-violet w-[300px] h-[300px] top-0 left-0 -translate-x-1/2 -translate-y-1/2"></div>
    <div class="ambient-orb bg-pink-600 w-[250px] h-[250px] bottom-0 right-0 translate-x-1/3 translate-y-1/3"></div>

    <!-- Login Container -->
    <div class="w-full max-w-md animate-fadeInUp">
        
        <!-- Logo Header -->
        <div class="text-center mb-8">
            <a href="/" class="inline-block text-3xl font-bold tracking-tighter text-white hover:opacity-80 transition-opacity">
                DECY<span class="text-brand-violet">.</span>
            </a>
            <p class="text-white/50 mt-2 text-sm">Sign in to save your custom AI stacks</p>
        </div>

        <!-- Glass Login Card -->
        <div class="glass-card p-8">
            <form onsubmit="handleLogin(event)" class="space-y-5">
                <div>
                    <label class="block text-sm font-medium text-white/70 mb-1.5" for="email">Email</label>
                    <input type="email" id="email" required placeholder="you@example.com" 
                        class="glass-input w-full rounded-xl px-4 py-3 text-sm placeholder-white/30" />
                </div>
                
                <div>
                    <label class="block text-sm font-medium text-white/70 mb-1.5" for="password">Password</label>
                    <input type="password" id="password" required placeholder="••••••••" 
                        class="glass-input w-full rounded-xl px-4 py-3 text-sm placeholder-white/30" />
                </div>

                <div class="flex items-center justify-between mt-2">
                    <label class="flex items-center gap-2 cursor-pointer">
                        <input type="checkbox" class="rounded bg-black/20 border-white/20 text-brand-violet focus:ring-brand-violet/50" />
                        <span class="text-xs text-white/50">Remember me</span>
                    </label>
                    <a href="#" class="text-xs text-brand-violet hover:text-purple-400 transition-colors">Forgot password?</a>
                </div>

                <button type="submit" class="glass-button w-full py-3 rounded-xl text-white font-semibold text-sm mt-2">
                    Sign In
                </button>
            </form>

            <div class="relative my-6">
                <div class="absolute inset-0 flex items-center">
                    <div class="w-full border-t border-white/10"></div>
                </div>
                <div class="relative flex justify-center text-xs">
                    <span class="bg-[#0A0A0A] px-2 text-white/40 rounded-full border border-white/10" style="backdrop-filter: blur(8px);">Or continue with</span>
                </div>
            </div>

            <button type="button" onclick="handleGoogleLogin()" class="google-button w-full py-3 rounded-xl flex items-center justify-center gap-3 text-white text-sm font-medium">
                <svg viewBox="0 0 24 24" class="w-5 h-5" xmlns="http://www.w3.org/2000/svg">
                    <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
                    <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
                    <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
                    <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
                </svg>
                Google
            </button>
        </div>
        
        <p class="text-center text-xs text-white/40 mt-6">
            Don't have an account? <a href="#" class="text-brand-violet hover:underline">Sign up</a>
        </p>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, GoogleAuthProvider, signInWithPopup } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDFv_Qb6y6WeFSL_TDuNJHyjiC-vx8wAHU",
            authDomain: "decyai.firebaseapp.com",
            projectId: "decyai",
            storageBucket: "decyai.firebasestorage.app",
            messagingSenderId: "967161401252",
            appId: "1:967161401252:web:cd7ca0b8dda2a692723b31",
            measurementId: "G-HSHPGDJELL"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const googleProvider = new GoogleAuthProvider();

        window.handleLogin = async function(e) {
            e.preventDefault();
            const btn = e.target.querySelector('button[type="submit"]');
            const originalText = btn.innerText;
            btn.innerHTML = '<span class="material-symbols-outlined animate-spin text-[18px]">sync</span>';
            
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            try {
                await signInWithEmailAndPassword(auth, email, password);
                window.location.href = '/';
            } catch (error) {
                alert("Login failed: " + error.message);
                btn.innerHTML = originalText;
            }
        };

        window.handleGoogleLogin = async function() {
            const btn = document.querySelector('.google-button');
            const originalHTML = btn.innerHTML;
            btn.innerHTML = '<span class="material-symbols-outlined animate-spin text-[18px]">sync</span>';
            
            try {
                await signInWithPopup(auth, googleProvider);
                window.location.href = '/';
            } catch (error) {
                alert("Google Sign-In failed: " + error.message);
                btn.innerHTML = originalHTML;
            }
        };
    </script>
</body>
</html>
